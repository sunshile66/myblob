# ============================================
# Myblob 服务器部署 Docker Compose
# 包含: Spring Boot后端 + PostgreSQL + Redis
# ============================================
# 使用方式:
#   1. 复制此文件到服务器: cp docker-compose.server.yml docker-compose.yml
#   2. 创建 .env 文件，填写配置
#   3. docker compose up -d
#
# 代理配置说明:
#   - 国内服务器: 配置 HTTP_PROXY_HOST/PORT 环境变量以访问 Google News/YouTube
#   - 海外服务器: 不需要代理，删除PROXY_*变量即可
#   - Twitter/X: 配置 TWITTER_API_KEY (twitterapi.io)
# ============================================

version: "3.8"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: myblob-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blog}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: myblob-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot 后端
  backend:
    image: eclipse-temurin:17-jre-alpine
    container_name: myblob-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./myblob-backend/target/*.jar:/app/app.jar
      - ./media:/app/media
    ports:
      - "8000:8000"
    environment:
      # 数据库 (连接到容器内的PostgreSQL)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-blog}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      # Redis (连接到容器内的Redis)
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # HTTP代理 (国内服务器配置，海外服务器留空)
      HTTP_PROXY_HOST: ${HTTP_PROXY_HOST:-}
      HTTP_PROXY_PORT: ${HTTP_PROXY_PORT:-0}
      HTTP_PROXY_ENABLED: ${HTTP_PROXY_ENABLED:-false}
      # Twitter/X API
      TWITTER_API_KEY: ${TWITTER_API_KEY:-}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-myblob-jwt-secret-key-change-in-production}
    command: ["java", "-jar", "/app/app.jar"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Vue 前端 (Nginx)
  frontend:
    image: nginx:alpine
    container_name: myblob-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./blog-frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  pgdata:
