<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/vite.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的博客</title>

  <!-- 字体预连接 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --theme-primary: #4F46E5;
      --theme-primary-light: rgba(79, 70, 229, 0.10);
      --theme-secondary: #6366F1;
      --theme-background: #FAFAFB;
      --theme-card: #FFFFFF;
      --theme-text: #0F172A;
      --theme-text-secondary: #64748B;
      --theme-border: #E5E7EB;
      --theme-hover: #F1F5F9;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", "HarmonyOS Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--theme-background);
      color: var(--theme-text);
      min-height: 100vh;
    }
  </style>
</head>

<body>
  <div id="app">
    <div style="padding: 60px 20px; text-align: center;">
      <h1 style="color: var(--theme-primary); font-size: 32px; margin-bottom: 20px;">加载中...</h1>
      <p style="color: var(--theme-text-secondary); font-size: 16px;">正在准备你的精彩内容</p>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
