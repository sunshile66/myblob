server:
  port: 8000
  servlet:
    context-path: /

spring:
  application:
    name: myblob
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/blog
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
    open-in-view: false
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 1
      timeout: 3000
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: smtp.qq.com
    port: 465
    username: 2754006802@qq.com
    password: kdoyyocklgysddba
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
    default-encoding: UTF-8

myblob:
  base-url: http://localhost:8000
  email:
    mock-mode: true # 关闭mock模式(mock-mode=false)并确保spring.mail配置正确以启用真实邮件发送
  jwt:
    secret: myblob-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration: 604800000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:3002,http://127.0.0.1:3003
  upload:
    path: ./media
    avatar-path: ./media/avatars
    post-path: ./media/posts

news:
  global:
    enabled: true
  proxy:
    http:
      host: ${HTTP_PROXY_HOST:}
      port: ${HTTP_PROXY_PORT:0}
      enabled: ${HTTP_PROXY_ENABLED:false}
    user-agent: MyBlob-NewsBot/1.0
    connect-timeout: 10000
    read-timeout: 15000
  fetch:
    thread-pool-size: 20
    max-items-per-source: 100
  twitter:
    api-key: ${TWITTER_API_KEY:new1_bcf2ef848f474f8f89457150b8097ff0}
    base-url: https://api.twitterapi.io

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.myblob: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
