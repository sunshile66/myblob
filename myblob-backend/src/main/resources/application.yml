server:
  port: ${SERVER_PORT:8000}
  servlet:
    context-path: /

spring:
  application:
    name: myblob
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:blog}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:1}
      timeout: 3000
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
    default-encoding: UTF-8

myblob:
  base-url: ${BASE_URL:http://localhost:8000}
  frontend-url: ${FRONTEND_URL:http://localhost:3001}
  email:
    mock-mode: ${MAIL_MOCK_MODE:true}
  jwt:
    secret: ${JWT_SECRET:myblob-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
    expiration: ${JWT_EXPIRATION:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3001,http://127.0.0.1:3001}
  upload:
    path: ${UPLOAD_PATH:./media}
    avatar-path: ${AVATAR_PATH:./media/avatars}
    post-path: ${POST_PATH:./media/posts}

news:
  global:
    enabled: true
  proxy:
    http:
      host: ${HTTP_PROXY_HOST:}
      port: ${HTTP_PROXY_PORT:0}
      enabled: ${HTTP_PROXY_ENABLED:false}
    user-agent: MyBlob-NewsBot/1.0
    connect-timeout: 10000
    read-timeout: 15000
  fetch:
    thread-pool-size: 20
    max-items-per-source: 100
  twitter:
    api-key: ${TWITTER_API_KEY:}
    base-url: https://api.twitterapi.io

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.myblob: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
