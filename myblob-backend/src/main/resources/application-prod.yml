# 生产环境配置
# 使用方法: 设置环境变量 SPRING_PROFILES_ACTIVE=prod

spring:
  jpa:
    hibernate:
      ddl-auto: validate  # 生产环境使用 validate，防止意外 schema 变更
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  datasource:
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  data:
    redis:
      timeout: 5000
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  mail:
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 10000
          timeout: 10000

server:
  tomcat:
    max-connections: 8192
    accept-count: 100
    connection-timeout: 20000
    threads:
      max: 200
      min-spare: 20

logging:
  level:
    root: WARN
    com.myblob: INFO
    org.hibernate.SQL: ERROR
    org.hibernate.type.descriptor.sql.BasicBinder: ERROR
  file:
    name: ./logs/myblob.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB

# 生产环境必须配置的环境变量:
# DB_PASSWORD - 数据库密码
# DB_HOST - 数据库主机
# DB_PORT - 数据库端口
# DB_NAME - 数据库名称
# JWT_SECRET - JWT 密钥（至少 256 位）
# MAIL_USERNAME - 邮件用户名
# MAIL_PASSWORD - 邮件密码
# CORS_ALLOWED_ORIGINS - CORS 允许的源（逗号分隔）
# FRONTEND_URL - 前端 URL
# BASE_URL - 后端 API 基础 URL
# REDIS_HOST - Redis 主机
# REDIS_PORT - Redis 端口
# UPLOAD_PATH - 文件上传路径
