# 生产环境配置
# 使用方法: 设置环境变量 SPRING_PROFILES_ACTIVE=prod

spring:
  jpa:
    hibernate:
      ddl-auto: validate  # 生产环境使用 validate，防止意外 schema 变更
    show-sql: false

logging:
  level:
    root: WARN
    com.myblob: INFO
    org.hibernate.SQL: ERROR
    org.hibernate.type.descriptor.sql.BasicBinder: ERROR

# 生产环境必须配置的环境变量:
# DB_PASSWORD - 数据库密码
# JWT_SECRET - JWT 密钥
# MAIL_USERNAME - 邮件用户名
# MAIL_PASSWORD - 邮件密码
# CORS_ALLOWED_ORIGINS - CORS 允许的源（逗号分隔）
# FRONTEND_URL - 前端 URL
